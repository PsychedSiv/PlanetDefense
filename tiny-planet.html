<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Planet Defense</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Courier New',monospace}
canvas{display:block;position:relative;z-index:0}
#label{position:fixed;top:14px;left:50%;transform:translateX(-50%);font-family:Georgia,serif;
  font-size:13px;font-style:italic;color:rgba(255,255,255,.18);letter-spacing:.22em;pointer-events:none}
#hint{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);font-size:11px;
  color:rgba(255,255,255,.38);letter-spacing:.1em;text-align:center;pointer-events:none}
#players-hud{position:fixed;top:14px;left:16px;font-size:11px;
  color:rgba(255,255,255,.5);line-height:2;pointer-events:none}
#my-hud{position:fixed;top:14px;right:16px;font-size:11px;
  color:rgba(255,255,255,.7);text-align:right;pointer-events:none;line-height:2}
/* HP bars */
#hp-wrap{position:fixed;bottom:50px;right:16px;display:flex;flex-direction:column;gap:4px;pointer-events:none}
.hprow{display:flex;align-items:center;gap:6px;justify-content:flex-end}
.hplabel{font-size:9px;color:rgba(255,255,255,.45);letter-spacing:.08em;white-space:nowrap}
.hpbar{width:100px;height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden}
.hpfill{height:100%;border-radius:3px;transition:width .15s}
#pawn-fill{background:linear-gradient(90deg,#44cc66,#88ff88);width:100%}
#ship-fill{background:linear-gradient(90deg,#4488ff,#88ccff);width:100%}
/* Crosshair */
#xhair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  width:22px;height:22px;pointer-events:none;display:none}
#xhair::before,#xhair::after{content:'';position:absolute;background:rgba(255,255,255,.75);border-radius:1px}
#xhair::before{width:2px;height:100%;left:50%;transform:translateX(-50%)}
#xhair::after{height:2px;width:100%;top:50%;transform:translateY(-50%)}
/* Kill feed */
#killfeed{position:fixed;top:50px;right:16px;font-size:10px;pointer-events:none;
  text-align:right;line-height:1.9}
/* Flash overlay */
#dmg-flash{position:fixed;inset:0;pointer-events:none;background:rgba(255,30,30,0);
  transition:background .08s}
#fx{position:fixed;top:46%;left:50%;transform:translate(-50%,-50%);
  font-size:1.5rem;pointer-events:none;opacity:0;transition:opacity .18s;text-align:center}
#respawn-hud{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:1.1rem;color:rgba(255,80,80,.9);pointer-events:none;display:none;
  text-align:center;text-shadow:0 0 16px rgba(255,0,0,.5)}
/* Touch controls */
#ctrl{position:fixed;bottom:0;left:0;right:0;height:185px;pointer-events:none}
.joy{position:absolute;width:130px;height:130px;pointer-events:all;touch-action:none}
.jbase{position:absolute;inset:0;border-radius:50%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.15)}
.jknob{position:absolute;width:50px;height:50px;border-radius:50%;
  background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);
  top:50%;left:50%;transform:translate(-50%,-50%)}
#jL{left:16px;bottom:16px}
#jR{right:16px;bottom:16px;display:none}
.btn{position:absolute;pointer-events:all;touch-action:none;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:1.1rem;
  background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.22);
  color:rgba(255,255,255,.8);cursor:pointer;user-select:none}
.btn.on{background:rgba(255,255,255,.28)}
#bBoard {right:20px; bottom:112px;width:54px;height:54px}
#bShoot {right:86px; bottom:74px; width:50px;height:50px}
#bLand  {left:50%;bottom:28px;transform:translateX(-50%);width:56px;height:56px;display:none}
#bThrust{right:152px;bottom:20px;width:50px;height:50px;display:none}
/* Planet size table */
#planet-table{position:fixed;top:100px;left:16px;background:rgba(0,0,0,.85);
  border:1px solid rgba(255,255,255,.25);padding:10px 12px;font-size:11px;
  color:rgba(255,255,255,.8);z-index:999;border-radius:5px;min-width:190px;
  pointer-events:all;user-select:none}
#planet-table h3{font-size:9px;letter-spacing:.12em;color:rgba(255,255,255,.4);
  margin-bottom:8px;font-weight:normal;text-transform:uppercase}
.pt-row{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.pt-name{flex:1;font-size:10px;color:rgba(255,255,255,.65)}
.pt-inp{width:54px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.3);
  color:#fff;font-family:'Courier New',monospace;font-size:11px;padding:2px 4px;
  border-radius:3px;text-align:right;outline:none;-moz-appearance:textfield}
.pt-inp::-webkit-inner-spin-button,.pt-inp::-webkit-outer-spin-button{opacity:1;cursor:pointer}
.pt-inp:focus{border-color:rgba(255,200,80,.8)}
.pt-star{color:#ffd700;font-size:10px;min-width:10px;text-align:center}
/* Login */
#login-screen{position:fixed;inset:0;background:rgba(0,0,0,.94);
  display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;gap:18px}
#login-screen h1{font-family:Georgia,serif;font-size:2rem;font-style:italic;
  color:rgba(255,255,255,.85);letter-spacing:.2em;font-weight:normal}
#login-screen p{font-size:11px;color:rgba(255,255,255,.3);letter-spacing:.12em}
#login-screen input{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.25);
  color:#fff;padding:10px 20px;font-family:'Courier New',monospace;font-size:14px;
  letter-spacing:.1em;border-radius:4px;text-align:center;outline:none;width:220px}
#login-screen input:focus{border-color:rgba(255,255,255,.5)}
#login-screen button{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.3);
  color:rgba(255,255,255,.8);padding:10px 36px;font-family:'Courier New',monospace;
  font-size:13px;letter-spacing:.12em;border-radius:4px;cursor:pointer}
#login-screen button:hover{background:rgba(255,255,255,.22)}
#login-err{font-size:11px;color:rgba(255,100,100,.7);letter-spacing:.08em;min-height:16px}
</style>
</head>
<body>
<div id="login-screen">
  <h1>planet defense</h1>
  <p>shoot or be shot</p>
  <input id="name-input" type="text" maxlength="16" placeholder="callsign"
         autocomplete="off" spellcheck="false"/>
  <button id="join-btn">launch</button>

</div>

<div id="label">planet defense</div>
<div id="players-hud"></div>
<div id="my-hud"></div>
<div id="hp-wrap">
  <div class="hprow"><span class="hplabel">SUIT</span><div class="hpbar"><div id="pawn-fill" class="hpfill"></div></div></div>
  <div class="hprow" id="ship-row" style="display:none"><span class="hplabel">SHIP</span><div class="hpbar"><div id="ship-fill" class="hpfill"></div></div></div>
</div>
<div id="xhair"></div>
<div id="killfeed"></div>
<div id="hint">…</div>
<div id="fx"></div>
<div id="dmg-flash"></div>
<div id="respawn-hud"></div>

<div id="planet-table">
  <h3>Solar System</h3>
  <div id="pt-rows"></div>
</div>

<div id="ctrl">
  <div id="jL" class="joy"><div class="jbase"></div><div id="jLk" class="jknob"></div></div>
  <div id="jR" class="joy"><div class="jbase"></div><div id="jRk" class="jknob"></div></div>
  <div id="bBoard"  class="btn">🚀</div>
  <div id="bShoot"  class="btn">🔫</div>
  <div id="bLand"   class="btn" style="font-size:.85rem">🌍<br><span style="font-size:.7rem">land</span></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// ═══════════════════════════════════════════════════════════
//  RENDERER + SCENE + CAMERA
// ═══════════════════════════════════════════════════════════
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x01020a);
const camera = new THREE.PerspectiveCamera(55,innerWidth/innerHeight,0.01,4000);

// ═══════════════════════════════════════════════════════════
//  STARS
// ═══════════════════════════════════════════════════════════
(function(){
  function mkStars(n,rMin,rMax,sz,op){
    const pts=new Float32Array(n*3);
    for(let i=0;i<n;i++){
      const th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1);
      const r=rMin+Math.random()*(rMax-rMin);
      pts[i*3]=r*Math.sin(ph)*Math.cos(th);
      pts[i*3+1]=r*Math.sin(ph)*Math.sin(th);
      pts[i*3+2]=r*Math.cos(ph);
    }
    const g=new THREE.BufferGeometry();
    g.setAttribute('position',new THREE.Float32BufferAttribute(pts,3));
    scene.add(new THREE.Points(g,new THREE.PointsMaterial({color:0xffffff,size:sz,sizeAttenuation:true,transparent:true,opacity:op})));
  }
  mkStars(3000,300,600,.6,.9);
  mkStars(5000,600,1200,.3,.4);
})();

// ═══════════════════════════════════════════════════════════
//  GLSL HELPERS
// ═══════════════════════════════════════════════════════════
function makeAtmosphere(R,color,intensity){
  const mat=new THREE.ShaderMaterial({
    uniforms:{c:{value:.35},p:{value:4.5},glowColor:{value:new THREE.Color(color)},intensity:{value:intensity}},
    vertexShader:`varying vec3 vNormal,vPos;
      void main(){vNormal=normalize(normalMatrix*normal);vPos=(modelViewMatrix*vec4(position,1.)).xyz;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
    fragmentShader:`uniform float c,p,intensity;uniform vec3 glowColor;varying vec3 vNormal,vPos;
      void main(){float rim=pow(c-dot(normalize(vNormal),normalize(-vPos)),p);gl_FragColor=vec4(glowColor,rim*intensity);}`,
    side:THREE.BackSide,blending:THREE.AdditiveBlending,transparent:true,depthWrite:false
  });
  return new THREE.Mesh(new THREE.SphereGeometry(R*1.18,32,32),mat);
}

const NOISE_GLSL=`
  float hash(vec3 p){p=fract(p*vec3(443.8975,397.2973,491.1871));p+=dot(p,p.yzx+19.19);return fract((p.x+p.y)*p.z);}
  float noise(vec3 p){vec3 i=floor(p),f=fract(p),u=f*f*(3.-2.*f);
    return mix(mix(mix(hash(i),hash(i+vec3(1,0,0)),u.x),mix(hash(i+vec3(0,1,0)),hash(i+vec3(1,1,0)),u.x),u.y),
               mix(mix(hash(i+vec3(0,0,1)),hash(i+vec3(1,0,1)),u.x),mix(hash(i+vec3(0,1,1)),hash(i+vec3(1,1,1)),u.x),u.y),u.z);}
  float fbm(vec3 p){return noise(p)*.5+noise(p*2.)*.25+noise(p*4.)*.125+noise(p*8.)*.0625;}`;

function makePlanetMat(colA,colB,colC,colD,spec){
  return new THREE.ShaderMaterial({
    uniforms:{colA:{value:new THREE.Color(colA)},colB:{value:new THREE.Color(colB)},
              colC:{value:new THREE.Color(colC)},colD:{value:new THREE.Color(colD)},specular:{value:spec||0}},
    vertexShader:`varying vec3 vNormal,vPos,vWorld;
      void main(){vNormal=normalize(normalMatrix*normal);vPos=(modelViewMatrix*vec4(position,1.)).xyz;
        vWorld=(modelMatrix*vec4(position,1.)).xyz;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
    fragmentShader:`${NOISE_GLSL}
      uniform vec3 colA,colB,colC,colD;uniform float specular;varying vec3 vNormal,vPos,vWorld;
      void main(){
        vec3 n=normalize(vNormal),viewDir=normalize(-vPos);
        vec3 sunView=normalize((viewMatrix*vec4(-vWorld,0.)).xyz);
        float nDotL=max(dot(n,sunView),0.);
        float h=fbm(normalize(vWorld)*2.8);
        vec3 col;
        if(h<.35)col=colA;else if(h<.50)col=mix(colA,colB,(h-.35)/.15);
        else if(h<.70)col=mix(colB,colC,(h-.50)/.20);else col=mix(colC,colD,(h-.70)/.30);
        float lat=abs(normalize(vWorld).y);
        if(lat>.75)col=mix(col,vec3(.92,.96,1.),smoothstep(.75,.9,lat));
        float term=smoothstep(0.,.08,nDotL);
        vec3 lit=col*(.10+nDotL*.85)*(.3+.7*term);
        if(h<.35&&specular>0.){vec3 hd=normalize(sunView+viewDir);lit+=vec3(.55,.75,1.)*pow(max(dot(n,hd),0.),48.)*specular*nDotL;}
        gl_FragColor=vec4(lit,1.);}`
  });
}

// ═══════════════════════════════════════════════════════════
//  SUN
// ═══════════════════════════════════════════════════════════
const SUN_R=6;
const sunMat=new THREE.ShaderMaterial({
  uniforms:{time:{value:0},tint:{value:new THREE.Color(1,1,1)}},
  vertexShader:`varying vec3 vP;void main(){vP=position;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
  fragmentShader:`${NOISE_GLSL}uniform float time;uniform vec3 tint;varying vec3 vP;
    void main(){vec3 n=normalize(vP);float f=fbm(n*3.+time*.15),f2=fbm(n*6.-time*.08);
      vec3 col=mix(vec3(1.,.6,.05),vec3(1.,.95,.2),f);col=mix(col,vec3(.9,.3,.0),f2*.4);
      gl_FragColor=vec4(col*tint,1.);}`
});
const sunGroup=new THREE.Group(); scene.add(sunGroup);
const sunMesh=new THREE.Mesh(new THREE.SphereGeometry(SUN_R,48,48),sunMat);
sunGroup.add(sunMesh);
[[1.25,0xffaa00,.22],[1.55,0xff6600,.10],[2.0,0xff3300,.04]].forEach(([s,c,o])=>{
  sunGroup.add(new THREE.Mesh(new THREE.SphereGeometry(SUN_R*s,24,24),
    new THREE.MeshBasicMaterial({color:c,transparent:true,opacity:o,side:THREE.BackSide,
      blending:THREE.AdditiveBlending,depthWrite:false})));
});
const sunLight=new THREE.PointLight(0xfff4e0,2.2,0); sunGroup.add(sunLight);
scene.add(new THREE.AmbientLight(0x0d1a33,.6));

// ═══════════════════════════════════════════════════════════
//  PLANETS
// ═══════════════════════════════════════════════════════════
let sunSize=SUN_R;   // adjustable star size (when original sun is the star)
let starIdx=-1;      // -1=original sun is star, 0-4=that planet is star
const KEPLER_G=20;   // GM_star = KEPLER_G * starSize; 20*6=120 matches original periods
let starTransition=null; // {elapsed,duration,fromPos[]} — animated star shift

const PLANET_DEFS=[
  {name:'p1',label:'green world', R:3.5,dist:28,yi:0, angle:0,
   colA:0x1a5fa8,colB:0xd4a96a,colC:0x5a9e60,colD:0xeef6ff,spec:.6,atmoColor:0x4488ff,atmoI:.8,trailCol:0x44aaff},
  {name:'p2',label:'desert',      R:2.8,dist:48,yi:3, angle:Math.PI*.4,
   colA:0xa03318,colB:0xd97a30,colC:0xe8b86a,colD:0xffe8cc,spec:0, atmoColor:0xff6622,atmoI:.5,trailCol:0xff6644},
  {name:'p3',label:'ice world',   R:2.0,dist:65,yi:-2,angle:Math.PI*.75,
   colA:0x224466,colB:0x5588bb,colC:0x99ccee,colD:0xddeeff,spec:.3,atmoColor:0x88ccff,atmoI:.6,trailCol:0x88ccff},
  {name:'p4',label:'giant',       R:4.2,dist:90,yi:5, angle:Math.PI*1.1,
   colA:0x553388,colB:0x7744aa,colC:0xbb88ee,colD:0xeeddff,spec:0, atmoColor:0xaa66ff,atmoI:.7,trailCol:0xcc88ff},
  {name:'p5',label:'toxic',       R:1.6,dist:118,yi:-4,angle:Math.PI*1.6,
   colA:0x334400,colB:0x667722,colC:0xaacc22,colD:0xeeff44,spec:0, atmoColor:0xaaff00,atmoI:.4,trailCol:0xccff44},
];

PLANET_DEFS.forEach(pd=>{
  pd.size=pd.R; pd.baseR=pd.R;
  pd.a=pd.dist;
  pd.inc=Math.atan2(-pd.yi,pd.dist);
  pd.phase=pd.angle;
  pd.gm=pd.R*.35;
  // Init physPos from Kepler elements
  const cx0=pd.a*Math.cos(pd.phase),sz0=pd.a*Math.sin(pd.phase);
  pd.physPos=new THREE.Vector3(cx0,-sz0*Math.sin(pd.inc),sz0*Math.cos(pd.inc));
  // Init velocity analytically (circular orbit, GM=120 initially)
  const om0=Math.sqrt(120/Math.pow(pd.a,3));
  pd.vel=new THREE.Vector3(-Math.sin(pd.phase)*om0*pd.a,
    -Math.cos(pd.phase)*Math.sin(pd.inc)*om0*pd.a,
     Math.cos(pd.phase)*Math.cos(pd.inc)*om0*pd.a);
  pd.mesh=new THREE.Mesh(new THREE.SphereGeometry(pd.R,64,64),makePlanetMat(pd.colA,pd.colB,pd.colC,pd.colD,pd.spec));
  pd.mesh.castShadow=true; pd.mesh.receiveShadow=true;
  pd.atmo=makeAtmosphere(pd.R,pd.atmoColor,pd.atmoI);
  pd.pivot=new THREE.Object3D();
  pd.pivot.add(pd.mesh); pd.pivot.add(pd.atmo);
  pd.pivot.position.copy(pd.physPos);
  scene.add(pd.pivot);
  if(pd.name==='p2'||pd.name==='p4'){
    const rMat=new THREE.MeshBasicMaterial({color:pd.name==='p2'?0xc8a87a:0xaa88cc,
      side:THREE.DoubleSide,transparent:true,opacity:.45});
    const ring=new THREE.Mesh(new THREE.RingGeometry(pd.R*1.35,pd.R*2.1,64),rMat);
    ring.rotation.x=pd.name==='p2'?Math.PI*.38:Math.PI*.3;
    pd.pivot.add(ring);
  }
});

// Decorations on p1
(function(){
  const P1=PLANET_DEFS[0];
  function placeOn(pivot,R,norm,obj){
    obj.position.copy(norm.clone().normalize().multiplyScalar(R));
    obj.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),norm.clone().normalize());
    pivot.add(obj);
  }
  let s=42; const rng=()=>{s=(s*1664525+1013904223)&0xffffffff;return(s>>>0)/0xffffffff;};
  const leafM=new THREE.MeshLambertMaterial({color:0x2d7a3a});
  const trunkM=new THREE.MeshLambertMaterial({color:0x7a4a20});
  for(let i=0;i<30;i++){
    const th=rng()*Math.PI*2,ph=rng()*Math.PI;
    if(ph<.28||ph>2.85)continue;
    const n=new THREE.Vector3(Math.sin(ph)*Math.cos(th),Math.cos(ph),Math.sin(ph)*Math.sin(th));
    const g=new THREE.Group();
    const tr=new THREE.Mesh(new THREE.CylinderGeometry(.022,.038,.22,6),trunkM); tr.position.y=.11; g.add(tr);
    [[.44,.28],[.60,.22],[.72,.16]].forEach(([y,rt])=>{
      const c=new THREE.Mesh(new THREE.ConeGeometry(rt,rt*1.8,7),leafM); c.position.y=y; g.add(c);
    });
    placeOn(P1.pivot,P1.R,n,g);
  }
  const wallM=new THREE.MeshLambertMaterial({color:0xf0e0c8});
  const roofM=new THREE.MeshLambertMaterial({color:0xcc4433});
  [[1.2,.8],[1.5,2.4],[2.0,4.8]].forEach(([ph,th])=>{
    const n=new THREE.Vector3(Math.sin(ph)*Math.cos(th),Math.cos(ph),Math.sin(ph)*Math.sin(th));
    const g=new THREE.Group();
    const base=new THREE.Mesh(new THREE.BoxGeometry(.24,.18,.24),wallM); base.position.y=.09; g.add(base);
    const roof=new THREE.Mesh(new THREE.ConeGeometry(.19,.17,4),roofM); roof.position.y=.26; roof.rotation.y=Math.PI/4; g.add(roof);
    placeOn(P1.pivot,P1.R,n,g);
  });
})();

// ═══════════════════════════════════════════════════════════
//  ASTRONAUT MODEL
// ═══════════════════════════════════════════════════════════
function makeAstronaut(){
  const g=new THREE.Group();
  const white=new THREE.MeshPhongMaterial({color:0xdde8ee,shininess:40});
  const dkGrey=new THREE.MeshPhongMaterial({color:0x334455,shininess:20});
  const visor=new THREE.MeshPhongMaterial({color:0x88aacc,shininess:120,transparent:true,opacity:.75});
  const orange=new THREE.MeshPhongMaterial({color:0xff6622,shininess:30});
  const suit=new THREE.MeshPhongMaterial({color:0xaabbc8,shininess:25});
  const torso=new THREE.Mesh(new THREE.CylinderGeometry(.095,.105,.22,12),white); torso.position.y=.18; g.add(torso);
  const chest=new THREE.Mesh(new THREE.BoxGeometry(.14,.10,.05),dkGrey); chest.position.set(0,.22,.10); g.add(chest);
  const pack=new THREE.Mesh(new THREE.BoxGeometry(.12,.16,.08),suit); pack.position.set(0,.20,-.11); g.add(pack);
  const neck=new THREE.Mesh(new THREE.CylinderGeometry(.042,.05,.055,10),white); neck.position.y=.31; g.add(neck);
  const helm=new THREE.Mesh(new THREE.SphereGeometry(.095,20,20),white); helm.position.y=.435; g.add(helm);
  const vis=new THREE.Mesh(new THREE.SphereGeometry(.072,16,16),visor); vis.position.set(0,.435,.045); vis.scale.set(1,.78,1); g.add(vis);
  const ring=new THREE.Mesh(new THREE.TorusGeometry(.098,.008,8,24),dkGrey); ring.position.y=.41; ring.rotation.x=Math.PI/2; g.add(ring);
  [-1,1].forEach(s=>{
    const sh=new THREE.Mesh(new THREE.SphereGeometry(.062,10,10),orange); sh.position.set(s*.16,.26,0); g.add(sh);
  });
  [-1,1].forEach((s,i)=>{
    const arm=new THREE.Mesh(new THREE.CylinderGeometry(.038,.042,.18,8),white);

function attachToPlanet(anchor,pd,normalLocal,gap=0.02){
  if(anchor.parent) anchor.parent.remove(anchor);
  pd.pivot.add(anchor);
  const n=normalLocal.clone().normalize();
  anchor.position.copy(n).multiplyScalar(pd.baseR+gap);

  const right=ref.clone().cross(n).normalize();
  const fwd=n.clone().cross(right).normalize();
  anchor.setRotationFromMatrix(new THREE.Matrix4().makeBasis(right,n,fwd.clone().negate()));
}

// ═══════════════════════════════════════════════════════════
//  KEPLER ORBITAL MECHANICS
// ═══════════════════════════════════════════════════════════
function getCurrentStarSize(){
  return starIdx<0 ? sunSize : PLANET_DEFS[starIdx].size;
}

// Map star size to a light/surface color (small=red, mid=yellow, large=blue)
function starColorFromSize(sz){
  const t=Math.min(1,Math.max(0,(sz-1)/24)); // 0→1 over size range 1–25
  const c=new THREE.Color();
  if(t<0.33)  c.setRGB(1.0, 0.35+t*1.3,  0.05+t*0.4);  // red→orange
  else if(t<0.66) c.setRGB(1.0, 0.78+(t-.33)*0.6, 0.2+(t-.33)*1.5); // orange→yellow
  else        c.setRGB(0.85+(t-.66)*.4, 0.92+(t-.66)*.2, 1.0);       // yellow→blue-white
  return c;
}

function updateStarVisuals(){
  const sz=getCurrentStarSize();
  sunGroup.scale.setScalar(sz/SUN_R);
  const col=starColorFromSize(sz);
  sunLight.color.copy(col);
  sunMat.uniforms.tint.value.copy(col);
  // Keep new star's planet mesh visible while it's still travelling to center
  PLANET_DEFS.forEach((pd,i)=>{ pd.pivot.visible=(i!==starIdx)||starTransition!==null; });
  updateTableStarMarkers();
}

function checkStarTransition(){
  let maxSz=sunSize, newIdx=-1;
  PLANET_DEFS.forEach((pd,i)=>{ if(pd.size>maxSz){maxSz=pd.size;newIdx=i;} });
  if(newIdx===starIdx) return;

  // Capture current world positions before any changes
  const fromPos=PLANET_DEFS.map(pd=>pd.physPos.clone());

  // Re-enable old star planet pivot so it's visible during transition
  if(starIdx>=0) PLANET_DEFS[starIdx].pivot.visible=true;

  if(newIdx>=0){
    const newStarPos=PLANET_DEFS[newIdx].physPos.clone();
    PLANET_DEFS.forEach((pd,i)=>{
      if(i===newIdx) return;
      const rel=pd.physPos.clone().sub(newStarPos);
      pd.a=Math.max(rel.length(),5);
      pd.phase=Math.atan2(rel.z,rel.x);
      pd.inc=Math.atan2(-rel.y,Math.max(pd.a,.1));
    });
    if(starIdx>=0){
      const rel=PLANET_DEFS[starIdx].physPos.clone().sub(newStarPos);
      PLANET_DEFS[starIdx].a=Math.max(rel.length(),5);
      PLANET_DEFS[starIdx].phase=Math.atan2(rel.z,rel.x);
    }
  } else {
    PLANET_DEFS.forEach((pd,i)=>{
      if(i===starIdx) return;
      const rel=pd.physPos.clone();
      pd.a=Math.max(rel.length(),5);
      pd.phase=Math.atan2(rel.z,rel.x);
      pd.inc=Math.atan2(-rel.y,Math.max(pd.a,.1));
    });
    if(starIdx>=0){
      PLANET_DEFS[starIdx].a=PLANET_DEFS[starIdx].dist;
      PLANET_DEFS[starIdx].phase=PLANET_DEFS[starIdx].angle;
      PLANET_DEFS[starIdx].inc=Math.atan2(-PLANET_DEFS[starIdx].yi,PLANET_DEFS[starIdx].dist);
    }
  }

  starIdx=newIdx;
  starTransition={elapsed:0, duration:4.0, fromPos};
  updateStarVisuals();
}

const _origin=new THREE.Vector3(0,0,0);
function keplerStep(dt){
  const GM=KEPLER_G*getCurrentStarSize();

  if(starTransition){
    starTransition.elapsed+=dt;
    const raw=Math.min(1,starTransition.elapsed/starTransition.duration);
    // Smooth ease-in-out
    const t=raw<0.5?2*raw*raw:1-Math.pow(-2*raw+2,2)/2;

    PLANET_DEFS.forEach((pd,i)=>{
      if(i===starIdx){
        // New star glides smoothly to origin
        pd.physPos.lerpVectors(starTransition.fromPos[i],_origin,t);
        pd.vel.set(0,0,0);
        pd.pivot.position.copy(pd.physPos);
        return;
      }
      // Advance Kepler phase continuously
      const omega=Math.sqrt(GM/Math.pow(pd.a,3));
      pd.phase+=omega*dt;
      const cx=pd.a*Math.cos(pd.phase),sz=pd.a*Math.sin(pd.phase);
      const kepPos=new THREE.Vector3(cx,-sz*Math.sin(pd.inc),sz*Math.cos(pd.inc));
      // Blend from captured start position into the new Kepler orbit
      pd.physPos.lerpVectors(starTransition.fromPos[i],kepPos,t);
      pd.vel.set(-Math.sin(pd.phase)*omega*pd.a,
                 -Math.cos(pd.phase)*Math.sin(pd.inc)*omega*pd.a,
                  Math.cos(pd.phase)*Math.cos(pd.inc)*omega*pd.a);
      pd.pivot.position.copy(pd.physPos);
    });

    if(starTransition.elapsed>=starTransition.duration){
      starTransition=null;
      // Snap star to exact origin and hide its planet mesh
      if(starIdx>=0){
        PLANET_DEFS[starIdx].physPos.set(0,0,0);
        PLANET_DEFS[starIdx].pivot.position.set(0,0,0);
      }
      updateStarVisuals(); // hides star planet pivot now that animation is done
    }
    return;
  }

  // Normal Kepler
  PLANET_DEFS.forEach((pd,i)=>{
    if(i===starIdx){
      pd.physPos.set(0,0,0); pd.vel.set(0,0,0);
      pd.pivot.position.set(0,0,0); return;
    }
    const omega=Math.sqrt(GM/Math.pow(pd.a,3));
    pd.phase+=omega*dt;
    const cx=pd.a*Math.cos(pd.phase), sz=pd.a*Math.sin(pd.phase);
    pd.physPos.set(cx,-sz*Math.sin(pd.inc),sz*Math.cos(pd.inc));
    pd.vel.set(-Math.sin(pd.phase)*omega*pd.a,
               -Math.cos(pd.phase)*Math.sin(pd.inc)*omega*pd.a,
                Math.cos(pd.phase)*Math.cos(pd.inc)*omega*pd.a);
    pd.pivot.position.copy(pd.physPos);
  });
}

// Gravity for ship/float: star at origin + planet masses
function gravAccel(pos){
  const r2s=Math.max(pos.x*pos.x+pos.y*pos.y+pos.z*pos.z,1),rs=Math.sqrt(r2s);
  const f0=KEPLER_G*getCurrentStarSize()/(r2s*rs);
  let ax=-pos.x*f0, ay=-pos.y*f0, az=-pos.z*f0;
  PLANET_DEFS.forEach((pd,i)=>{
    if(i===starIdx) return;
    const dx=pd.physPos.x-pos.x,dy=pd.physPos.y-pos.y,dz=pd.physPos.z-pos.z;
    const r2=Math.max(dx*dx+dy*dy+dz*dz,1),rs2=Math.sqrt(r2),f=pd.gm/(r2*rs2);
    ax+=dx*f; ay+=dy*f; az+=dz*f;
  });
  return {x:ax,y:ay,z:az};
}

//  WALKING
// ═══════════════════════════════════════════════════════════
const WALK_SPEED=(2*Math.PI*3.5)/30, RUN_MULT=2.4;
let isRunning=false, stepT=0;
let charFwd=new THREE.Vector3(0,0,1);
let camFwd=new THREE.Vector3(0,0,1);
let camElevation=0.15;  // bullet aim elevation only (0=horizontal)
const CAM_ELEV_MIN=-1.3, CAM_ELEV_MAX=0.85;

function walkStep(dt,moveFwd,moveRight){
  const speed=WALK_SPEED*(isRunning?RUN_MULT:1)*dt;
  const up=charPivot.position.clone().normalize();
  const cfwd=camFwd.clone().addScaledVector(up,-camFwd.dot(up)).normalize();
  const cright=cfwd.clone().cross(up).normalize();
  const moving=moveFwd||moveRight;
  if(moving){
    const md=new THREE.Vector3();
    if(moveFwd)  md.addScaledVector(cfwd,moveFwd);
    if(moveRight)md.addScaledVector(cright,moveRight);
    if(md.lengthSq()>.0001){
      md.normalize();
      charFwd.copy(md).addScaledVector(up,-md.dot(up)).normalize();
      const ang=speed/activePD.R, c=Math.cos(ang), s=Math.sin(ang);
      const nUp=up.clone().multiplyScalar(c).addScaledVector(md,s).normalize();
      const nFwd=md.clone().multiplyScalar(c).addScaledVector(up,-s).normalize();
      charPivot.position.copy(nUp).multiplyScalar(activePD.baseR+.02);
      charFwd.copy(nFwd).addScaledVector(nUp,-nFwd.dot(nUp)).normalize();
    }
  }
  const n=charPivot.position.clone().normalize();
  const f=charFwd.clone().addScaledVector(n,-charFwd.dot(n)).normalize();
  const r=f.clone().cross(n).normalize();
  charPivot.setRotationFromMatrix(new THREE.Matrix4().makeBasis(r,n,f.clone().negate()));
  if(moving){
    stepT+=dt*(isRunning?18:8);
    const sw=Math.sin(stepT)*(isRunning?.11:.06);
    charMesh.children.forEach(c=>{
      if(c.name==='thighL')c.rotation.x= sw*1.2;
      if(c.name==='thighR')c.rotation.x=-sw*1.2;
      if(c.name==='shinL') c.rotation.x= Math.abs(sw)*.6;
      if(c.name==='shinR') c.rotation.x= Math.abs(-sw)*.6;
      if(c.name==='armL')  c.rotation.x=-sw*.8;
      if(c.name==='armR')  c.rotation.x= sw*.8;
    });
  } else {
    charMesh.children.forEach(c=>{
      if(['thighL','thighR','shinL','shinR','armL','armR'].includes(c.name))c.rotation.x=0;
    });
  }
}

const SHIP_SPEED=5, SHIP_TURN=1.4, SHIP_ROLL=1.6;
let shipQ=new THREE.Quaternion();
let shipPos=new THREE.Vector3();
let shipVel=new THREE.Vector3();
const shipPhysBody={pos:shipPos,vel:shipVel,gm:0};

function getShipFwd(){return new THREE.Vector3(0,0,-1).applyQuaternion(shipQ).normalize();}
function getShipUp() {return new THREE.Vector3(0,1,0).applyQuaternion(shipQ).normalize();}

function enterShip(){
  shipPivot.updateWorldMatrix(true,false);
  const me=shipPivot.matrixWorld.elements;
  shipPos.set(me[12],me[13],me[14]);
  const sx=new THREE.Vector3(me[0],me[1],me[2]).length();
  const rm=new THREE.Matrix4();
  rm.set(me[0]/sx,me[4],me[8],0, me[1]/sx,me[5],me[9],0, me[2]/sx,me[6],me[10],0, 0,0,0,1);
  shipQ.setFromRotationMatrix(rm).normalize();
  shipVel.copy(activePD.vel);
  if(shipPivot.parent) shipPivot.parent.remove(shipPivot);
  scene.add(shipPivot);
  shipPivot.position.copy(shipPos);
  charMesh.visible=false;
  myShipHp=SHIP_MAX_HP;
  gameState='fly';
  renderer.domElement.requestPointerLock();
  setTimeout(refreshOrbits,100);
  updateUI();
}

function shipFlyStep(dt,thrustFB,strafeRL,roll){
  if(roll){  const q=new THREE.Quaternion().setFromAxisAngle(getShipFwd(),-roll*SHIP_ROLL*dt); shipQ.multiplyQuaternions(q,shipQ).normalize();}
  if(thrustFB) shipVel.addScaledVector(getShipFwd(),thrustFB*SHIP_SPEED*dt);
  if(strafeRL){const r=new THREE.Vector3(1,0,0).applyQuaternion(shipQ).normalize(); shipVel.addScaledVector(r,strafeRL*SHIP_SPEED*dt);}
  const a0=gravAccel(shipPos);
  shipPos.x+=shipVel.x*dt+.5*a0.x*dt*dt; shipPos.y+=shipVel.y*dt+.5*a0.y*dt*dt; shipPos.z+=shipVel.z*dt+.5*a0.z*dt*dt;
  const a1=gravAccel(shipPos);
  shipVel.x+=.5*(a0.x+a1.x)*dt; shipVel.y+=.5*(a0.y+a1.y)*dt; shipVel.z+=.5*(a0.z+a1.z)*dt;
  shipPivot.position.copy(shipPos);
  shipPivot.setRotationFromQuaternion(shipQ);
  const thrusting=thrustFB>0||strafeRL!==0;
  const gl=shipMesh.getObjectByName('glow'); if(gl) gl.intensity=thrusting?2.2:.1;
  ['glowL','glowR'].forEach(n=>{const l=shipMesh.getObjectByName(n);if(l)l.intensity=thrusting?.4:0;});
}

// ═══════════════════════════════════════════════════════════
//  FLOAT STATE (drifting after ship destroyed)
// ═══════════════════════════════════════════════════════════
function enterFloat(){
  // Inherit ship position + velocity
  floatPos.copy(shipPos);
  floatVel.copy(shipVel);
  // Remove ship from scene
  if(shipPivot.parent) shipPivot.parent.remove(shipPivot);
  // Place astronaut in world space
  if(charPivot.parent) charPivot.parent.remove(charPivot);
  scene.add(charPivot);
  charPivot.position.copy(floatPos);
  charMesh.visible=true;
  // Explosion at ship position
  spawnExplosion(shipPos.clone(),2.0,0xff6600);
  gameState='float';
  respawnTimer=12; // auto-respawn after 12s
  ORBIT_LINES.forEach(l=>l.visible=false); SHIP_ORBIT.visible=false;
  updateUI();
}

function floatStep(dt){
  // Apply gravity from star + planets
  const a=gravAccel(floatPos);
  floatPos.x+=floatVel.x*dt+.5*a.x*dt*dt;
  floatPos.y+=floatVel.y*dt+.5*a.y*dt*dt;
  floatPos.z+=floatVel.z*dt+.5*a.z*dt*dt;
  floatVel.x+=a.x*dt; floatVel.y+=a.y*dt; floatVel.z+=a.z*dt;

  // Orient "up" toward nearest planet
  let nearPD=null, nearD=Infinity;
  PLANET_DEFS.forEach(pd=>{const d=floatPos.distanceTo(pd.physPos);if(d<nearD){nearD=d;nearPD=pd;}});
  let up=floatPos.clone().normalize();
  if(nearPD) up=floatPos.clone().sub(nearPD.physPos).normalize();

  charPivot.position.copy(floatPos);
  // Make character face camera/motion direction
  const fwdVel=floatVel.clone().addScaledVector(up,-floatVel.dot(up));
  if(fwdVel.lengthSq()>.001){
    const fwd=fwdVel.normalize();
    const right=fwd.clone().cross(up).normalize();
    charPivot.setRotationFromMatrix(new THREE.Matrix4().makeBasis(right,up,fwd.clone().negate()));
  }

  // Auto-land on planet
  if(nearPD && nearD<nearPD.R+.8){
    landOnFloat(nearPD);
    return;
  }

  // Respawn countdown
  if(!respawning){
    respawnTimer-=dt;
    if(respawnTimer<=0) beginRespawn();
    document.getElementById('respawn-hud').textContent=
      `FLOATING IN SPACE\nrespawn in ${Math.ceil(Math.max(0,respawnTimer))}s`;
  }
}

function landOnFloat(pd){
  const norm=floatPos.clone().sub(pd.physPos).normalize();
  activePD=pd;
  attachToPlanet(charPivot,pd,norm,.02);
  charFwd=norm.clone().cross(new THREE.Vector3(0,1,0)).normalize();
  if(charFwd.lengthSq()<.01){charFwd.set(1,0,0);charFwd.addScaledVector(norm,-charFwd.dot(norm)).normalize();}
  camFwd.copy(charFwd);
  charMesh.visible=true;
  gameState='walk';
  document.getElementById('respawn-hud').style.display='none';
  updateUI();
}

function tryLand(){
  let best=null,bd=Infinity;
  PLANET_DEFS.forEach(pd=>{const d=shipPos.distanceTo(pd.physPos);if(d<pd.R+3.5&&d<bd){bd=d;best=pd;}});
  if(best) landOn(best);
}
function landOn(pd){
  const norm=shipPos.clone().sub(pd.physPos).normalize();
  activePD=pd;
  scene.remove(shipPivot);
  attachToPlanet(shipPivot,pd,norm,.01);
  const cn=norm.clone(); let t=new THREE.Vector3(0,0,1); if(Math.abs(norm.dot(t))>.99)t.set(1,0,0);
  t.cross(norm).normalize(); cn.addScaledVector(t,.15).normalize();
  attachToPlanet(charPivot,pd,cn);
  charFwd.copy(t).addScaledVector(cn,-t.dot(cn)).normalize();
  if(charFwd.length()<.01){charFwd.set(1,0,0);charFwd.addScaledVector(cn,-charFwd.dot(cn)).normalize();}
  camFwd.copy(charFwd);
  charMesh.visible=true;
  ORBIT_LINES.forEach(l=>l.visible=false); SHIP_ORBIT.visible=false;
  gameState='walk';
  updateUI();
}

function beginRespawn(){
  respawning=true;
  document.getElementById('respawn-hud').style.display='block';
  document.getElementById('respawn-hud').textContent='RESPAWNING…';
  setTimeout(()=>{
    // Find nearest planet
    let best=PLANET_DEFS[0], bd=Infinity;
    const refPos=gameState==='float'?floatPos:charPivot.getWorldPosition(new THREE.Vector3());
    PLANET_DEFS.forEach(pd=>{const d=refPos.distanceTo(pd.physPos);if(d<bd){bd=d;best=pd;}});
    activePD=best;
    // Random spawn location on planet
    const th=Math.random()*Math.PI*2, ph=Math.acos(2*Math.random()-1);
    const norm=new THREE.Vector3(Math.sin(ph)*Math.cos(th),Math.cos(ph),Math.sin(ph)*Math.sin(th));
    attachToPlanet(charPivot,best,norm,.02);
    charMesh.visible=true;
    myHp=ASTRO_MAX_HP; myShipHp=SHIP_MAX_HP;
    gameState='walk'; respawning=false;
    document.getElementById('respawn-hud').style.display='none';
    updateHud();
    updateUI();
  },3000);
}

function takeDamage(amount, hitType, killerId){
  if(respawning) return;
  if(hitType==='ship' && gameState==='fly'){
    myShipHp=Math.max(0,myShipHp-amount);
    updateHud();
    flashDamage();
    if(myShipHp<=0) destroyShip(killerId);
  } else if(gameState==='walk'||gameState==='float'){
    myHp=Math.max(0,myHp-amount);
    updateHud();
    flashDamage();
    if(myHp<=0) diePawn(killerId);
  }
}

function destroyShip(killerId){
  if(killerId && remotePlayers[killerId]) addKillFeed(`${remotePlayers[killerId].name} destroyed your ship`);
  broadcastDie('ship');
  enterFloat();
}

function diePawn(killerId){
  if(killerId && remotePlayers[killerId]) addKillFeed(`${remotePlayers[killerId].name} eliminated you`);
  broadcastDie('pawn');
  beginRespawn();
}

const _cwp=new THREE.Vector3();
function walkCamera(){
  charPivot.updateWorldMatrix(true,false);
  const me=charPivot.matrixWorld.elements;
  const wUp=new THREE.Vector3(me[4],me[5],me[6]).normalize();
  charPivot.getWorldPosition(_cwp);
  camFwd.addScaledVector(wUp,-camFwd.dot(wUp)).normalize();
  // Over-the-shoulder: camera behind+right, looks forward past character
  const camRight=new THREE.Vector3().crossVectors(wUp,camFwd).normalize();
  const aimDir=camFwd.clone().multiplyScalar(Math.cos(camElevation))
    .addScaledVector(wUp,Math.sin(camElevation));
  camera.position.copy(_cwp)
    .addScaledVector(aimDir,-5.5)
    .addScaledVector(camRight,0.75)
    .addScaledVector(wUp,0.4);
  camera.up.copy(wUp);
  // Look at a point ahead+eye-level: character sits left-of-center, crosshair aims forward
  camera.lookAt(_cwp.clone().addScaledVector(camFwd,2.0).addScaledVector(wUp,0.8));
}
function flyCamera(){
  const fwd=getShipFwd(),up=getShipUp();
  camera.position.copy(shipPos).addScaledVector(fwd,-5).addScaledVector(up,1.8);
  camera.up.copy(up);
  camera.lookAt(shipPos.clone().addScaledVector(fwd,3));
}
function floatCamera(){
  let up=floatPos.clone().normalize();
  let nearD=Infinity;
  PLANET_DEFS.forEach(pd=>{const d=floatPos.distanceTo(pd.physPos);if(d<nearD){nearD=d;up=floatPos.clone().sub(pd.physPos).normalize();}});
  camFwd.addScaledVector(up,-camFwd.dot(up)).normalize();
  const camRight=new THREE.Vector3().crossVectors(up,camFwd).normalize();
  const aimDir=camFwd.clone().multiplyScalar(Math.cos(camElevation))
    .addScaledVector(up,Math.sin(camElevation));
  camera.position.copy(floatPos)
    .addScaledVector(aimDir,-5.5)
    .addScaledVector(camRight,0.75)
    .addScaledVector(up,0.4);
  camera.up.copy(up);
  camera.lookAt(floatPos.clone().addScaledVector(camFwd,2.0).addScaledVector(up,0.8));
}

const OSTEPS=2400,ODT=.22;
function makeOLine(color,opacity){
  const pts=new Float32Array(OSTEPS*3),geo=new THREE.BufferGeometry();
  const a=new THREE.BufferAttribute(pts,3); a.setUsage(THREE.DynamicDrawUsage);
  geo.setAttribute('position',a); geo.setDrawRange(0,0);
  const l=new THREE.Line(geo,new THREE.LineBasicMaterial({color,transparent:true,opacity,depthWrite:false}));
  l.frustumCulled=false; scene.add(l); l.visible=false; return l;
}
const ORBIT_LINES=PLANET_DEFS.map(pd=>makeOLine(pd.trailCol,.15));
const SHIP_ORBIT=makeOLine(0xffffff,.7);
function refreshOrbits(){
  const fly=gameState==='fly';
  // Analytical Kepler ellipses for each planet
  PLANET_DEFS.forEach((pd,i)=>{
    if(i===starIdx){ORBIT_LINES[i].visible=false;return;}
    ORBIT_LINES[i].visible=fly;
    if(!fly) return;
    const pts=ORBIT_LINES[i].geometry.attributes.position.array;
    for(let s=0;s<OSTEPS;s++){
      const ph=(s/OSTEPS)*Math.PI*2;
      const cx=pd.a*Math.cos(ph), sz=pd.a*Math.sin(ph);
      pts[s*3]=cx; pts[s*3+1]=-sz*Math.sin(pd.inc); pts[s*3+2]=sz*Math.cos(pd.inc);
    }
    ORBIT_LINES[i].geometry.attributes.position.needsUpdate=true;
    ORBIT_LINES[i].geometry.setDrawRange(0,OSTEPS);
  });
  // Ship orbit trace (Verlet with current planet positions fixed)
  SHIP_ORBIT.visible=false;
  if(fly){
    const sPth=new Float32Array(OSTEPS*3); let sC=0;
    const sP=shipPos.clone(), sV=shipVel.clone();
    for(let s=0;s<OSTEPS;s++){
      const a0=gravAccel(sP);
      sP.x+=sV.x*ODT+.5*a0.x*ODT*ODT;sP.y+=sV.y*ODT+.5*a0.y*ODT*ODT;sP.z+=sV.z*ODT+.5*a0.z*ODT*ODT;
      const a1=gravAccel(sP);
      sV.x+=.5*(a0.x+a1.x)*ODT;sV.y+=.5*(a0.y+a1.y)*ODT;sV.z+=.5*(a0.z+a1.z)*ODT;
      sPth[sC*3]=sP.x;sPth[sC*3+1]=sP.y;sPth[sC*3+2]=sP.z;sC++;
      if(sP.lengthSq()>800*800) break;
    }
    if(sC>0){
      SHIP_ORBIT.geometry.attributes.position.array.set(sPth);
      SHIP_ORBIT.geometry.attributes.position.needsUpdate=true;
      SHIP_ORBIT.geometry.setDrawRange(0,sC);
      SHIP_ORBIT.visible=true;
    }
  }
}

const SHOT_DMG=25;         // damage per hit (4 hits to kill)
const SHOT_SPEED=38;       // units/sec
const SHOT_LIFE=4;         // seconds
const HITBOX_ASTRO=.45;    // hit radius for astronaut
const HITBOX_SHIP=1.0;     // hit radius for ship

const localProjs=[];   // projectiles we fired (for hit detection)
const visualProjs=[];  // remote projectiles (visual only)
const explosions=[];

function makeProjectileMesh(color){
  const g=new THREE.Group();
  g.add(new THREE.Mesh(new THREE.SphereGeometry(.075,6,6),
    new THREE.MeshBasicMaterial({color:0xffffff})));
  g.add(new THREE.Mesh(new THREE.SphereGeometry(.18,8,8),
    new THREE.MeshBasicMaterial({color,transparent:true,opacity:.55,
      blending:THREE.AdditiveBlending,depthWrite:false})));
  const light=new THREE.PointLight(color,1.2,3.5);
  g.add(light);
  return g;
}

function fireShot(){
  if(respawning) return;
  let origin, dir, color, type;
  if(gameState==='fly'){
    origin=shipPos.clone().addScaledVector(getShipFwd(),1.2);
    dir=getShipFwd(); color=0x44aaff; type='ship';
  } else if(gameState==='walk'){
    charPivot.updateWorldMatrix(true,false);
    const _me=charPivot.matrixWorld.elements;
    const wUp=new THREE.Vector3(_me[4],_me[5],_me[6]).normalize();
    charPivot.getWorldPosition(origin=new THREE.Vector3());
    // Muzzle: slightly above character centre (gun height)
    origin.addScaledVector(wUp,.7);
    // TPS aim: ray from camera through crosshair → far hit point
    // Bullet direction = muzzle → hit point (matches what player sees at screen centre)
    camera.updateMatrixWorld();
    const camDir=new THREE.Vector3(); camera.getWorldDirection(camDir);
    const traceHit=camera.position.clone().addScaledVector(camDir,200);
    dir=traceHit.sub(origin).normalize();
    color=0xff8822; type='astro';
  } else { // float
    origin=floatPos.clone().addScaledVector(camFwd,.4);
    camera.updateMatrixWorld();
    const camDir=new THREE.Vector3(); camera.getWorldDirection(camDir);
    const traceHit=camera.position.clone().addScaledVector(camDir,200);
    dir=traceHit.sub(origin).normalize();
    color=0xff8822; type='astro';
  }
  const vel=dir.clone().multiplyScalar(SHOT_SPEED);
  if(gameState==='fly') vel.add(shipVel);
  else if(gameState==='float') vel.add(floatVel);

  const mesh=makeProjectileMesh(color);
  mesh.position.copy(origin); scene.add(mesh);
  localProjs.push({mesh,pos:origin.clone(),vel,type,life:SHOT_LIFE,color});
  broadcastShot(origin,vel,color,type);

  // Muzzle flash
  const flash=new THREE.PointLight(color,3,4); flash.position.copy(origin); scene.add(flash);
  setTimeout(()=>scene.remove(flash),80);
}

function spawnExplosion(pos,scale=1.0,color=0xff6600){
  const count=90;
  const positions=new Float32Array(count*3);
  const vels=[];
  for(let i=0;i<count;i++){
    const d=new THREE.Vector3(Math.random()-.5,Math.random()-.5,Math.random()-.5).normalize();
    const spd=(Math.random()*2.5+1)*scale*4;
    vels.push(d.clone().multiplyScalar(spd));
    positions[i*3]=pos.x; positions[i*3+1]=pos.y; positions[i*3+2]=pos.z;
  }
  const geo=new THREE.BufferGeometry();
  const posAttr=new THREE.Float32BufferAttribute(positions,3);
  posAttr.setUsage(THREE.DynamicDrawUsage);
  geo.setAttribute('position',posAttr);
  const pts=new THREE.Points(geo,new THREE.PointsMaterial({
    color,size:.22*scale,transparent:true,opacity:1,
    blending:THREE.AdditiveBlending,depthWrite:false,sizeAttenuation:true}));
  scene.add(pts);
  const flash=new THREE.PointLight(color,4*scale,12*scale); flash.position.copy(pos); scene.add(flash);
  setTimeout(()=>scene.remove(flash),200);
  explosions.push({pts,posAttr,vels,life:1.4,maxLife:1.4});
}

function updateExplosions(dt){
  for(let i=explosions.length-1;i>=0;i--){
    const ex=explosions[i]; ex.life-=dt;
    if(ex.life<=0){scene.remove(ex.pts);explosions.splice(i,1);continue;}
    const t=ex.life/ex.maxLife;
    ex.pts.material.opacity=t*t;
    const arr=ex.posAttr.array;
    ex.vels.forEach((v,j)=>{arr[j*3]+=v.x*dt;arr[j*3+1]+=v.y*dt;arr[j*3+2]+=v.z*dt;v.multiplyScalar(1-dt*1.8);});
    ex.posAttr.needsUpdate=true;
  }
}

function updateLocalProjs(dt){
  for(let i=localProjs.length-1;i>=0;i--){
    const p=localProjs[i]; p.life-=dt;
    // Apply weak gravity from sun
    const ts=p.pos.clone().negate();
    const l2=Math.max(ts.lengthSq(),100);
    p.vel.addScaledVector(ts.normalize(),KEPLER_G*getCurrentStarSize()/l2*dt);
    p.pos.addScaledVector(p.vel,dt);
    p.mesh.position.copy(p.pos);

    let hit=false;
    // Check hit against remote players
    for(const rp of Object.values(remotePlayers)){
      if(!rp.pos) continue;
      let rpWorldPos=new THREE.Vector3();
      const mesh=rp.state==='fly'?rp.ship:rp.astro;
      if(!mesh.visible) continue;
      mesh.getWorldPosition(rpWorldPos);
      const hitR=rp.state==='fly'?HITBOX_SHIP:HITBOX_ASTRO;
      if(p.pos.distanceTo(rpWorldPos)<hitR){
        hit=true;
        spawnExplosion(p.pos.clone(),.4,p.color);
        broadcastHit(rp.id,SHOT_DMG,rp.state==='fly'?'ship':'astro');
        break;
      }
    }
    // Self-collision with planets
    if(!hit){
      for(const pd of PLANET_DEFS){
        if(p.pos.distanceTo(pd.physPos)<pd.R){
          hit=true;
          spawnExplosion(p.pos.clone(),.3,p.color);
          break;
        }
      }
    }
    if(hit||p.life<=0){scene.remove(p.mesh);localProjs.splice(i,1);}
  }
}

function updateVisualProjs(dt){
  for(let i=visualProjs.length-1;i>=0;i--){
    const p=visualProjs[i]; p.life-=dt;
    p.pos.addScaledVector(p.vel,dt);
    p.mesh.position.copy(p.pos);
    if(p.life<=0){scene.remove(p.mesh);visualProjs.splice(i,1);}
  }
}

addEventListener('mousemove',e=>{
  const locked=document.pointerLockElement===renderer.domElement;
  if(!locked) return;
  if(gameState==='fly'){
    // Yaw: rotate around ship's up axis
    const qY=new THREE.Quaternion().setFromAxisAngle(getShipUp(),-e.movementX*.002);
    shipQ.multiplyQuaternions(qY,shipQ).normalize();
    // Pitch: rotate around ship's right axis
    const right=new THREE.Vector3(1,0,0).applyQuaternion(shipQ).normalize();
    const qP=new THREE.Quaternion().setFromAxisAngle(right,-e.movementY*.002);
    shipQ.multiplyQuaternions(qP,shipQ).normalize();
  } else if(gameState==='walk'||gameState==='float'){
    let wUp;
    if(gameState==='walk'){
      charPivot.updateWorldMatrix(true,false);
      const me=charPivot.matrixWorld.elements;
      wUp=new THREE.Vector3(me[4],me[5],me[6]).normalize();
    } else {
      wUp=floatPos.clone().normalize();
      let nearD=Infinity;
      PLANET_DEFS.forEach(pd=>{const d=floatPos.distanceTo(pd.physPos);if(d<nearD){nearD=d;wUp=floatPos.clone().sub(pd.physPos).normalize();}});
    }
    const q=new THREE.Quaternion().setFromAxisAngle(wUp,-e.movementX*.003);
    camFwd.applyQuaternion(q).addScaledVector(wUp,-camFwd.dot(wUp)).normalize();
    camElevation=Math.max(CAM_ELEV_MIN,Math.min(CAM_ELEV_MAX,camElevation-e.movementY*.003));
  }
});

// Joysticks
const JOY={lx:0,ly:0,rx:0,ry:0};
function makeJoy(zone,knob,xk,yk){
  let id=null; const JMAX=52;
  const mv=(cx,cy)=>{const r=zone.getBoundingClientRect();let ox=cx-(r.left+r.width/2),oy=cy-(r.top+r.height/2);const l=Math.sqrt(ox*ox+oy*oy),cl=Math.min(l,JMAX);const nx=l>0?ox/l:0,ny=l>0?oy/l:0;knob.style.transform=`translate(calc(-50% + ${nx*cl}px),calc(-50% + ${ny*cl}px))`;JOY[xk]=Math.abs(nx)>.12?nx:0;JOY[yk]=Math.abs(ny)>.12?ny:0;};
  const rs=()=>{knob.style.transform='translate(-50%,-50%)';JOY[xk]=0;JOY[yk]=0;};
  zone.addEventListener('touchstart',e=>{e.preventDefault();id=e.changedTouches[0].identifier;mv(e.changedTouches[0].clientX,e.changedTouches[0].clientY);},{passive:false});
  zone.addEventListener('touchmove',e=>{e.preventDefault();for(const t of e.changedTouches)if(t.identifier===id)mv(t.clientX,t.clientY);},{passive:false});
  zone.addEventListener('touchend',e=>{e.preventDefault();id=null;rs();},{passive:false});
  let dn=false;
  zone.addEventListener('mousedown',e=>{dn=true;mv(e.clientX,e.clientY);});
  zone.addEventListener('mousemove',e=>{if(dn)mv(e.clientX,e.clientY);});
  zone.addEventListener('mouseup',()=>{dn=false;rs();});
}
makeJoy(document.getElementById('jL'),document.getElementById('jLk'),'lx','ly');
makeJoy(document.getElementById('jR'),document.getElementById('jRk'),'rx','ry');

function holdBtn(el,dn,up){el.addEventListener('touchstart',e=>{e.preventDefault();el.classList.add('on');dn();},{passive:false});el.addEventListener('touchend',e=>{e.preventDefault();el.classList.remove('on');up&&up();},{passive:false});el.addEventListener('mousedown',()=>{el.classList.add('on');dn();});el.addEventListener('mouseup',()=>{el.classList.remove('on');up&&up();});}

const PLAYER_COLORS=[0xff4466,0x44ffaa,0x4488ff,0xffaa22,0xcc44ff,0xff8844,0x44ffff,0x88ff44];

// ═══════════════════════════════════════════════════════════
//  SNAPSHOT INTERPOLATION BUFFER
// ═══════════════════════════════════════════════════════════
class SnapBuffer{
  constructor(delayMs=150){this.states=[];this.delayMs=delayMs;}
  add(s){s.t=Date.now();this.states.push(s);const c=Date.now()-2000;while(this.states.length>2&&this.states[0].t<c)this.states.shift();}
  get(){
    const rt=Date.now()-this.delayMs;
    if(!this.states.length) return null;
    if(this.states.length===1) return {a:this.states[0],b:null,alpha:0};
    for(let i=this.states.length-1;i>=1;i--){
      if(this.states[i-1].t<=rt&&this.states[i].t>=rt){
        const a=this.states[i-1],b=this.states[i];
        return {a,b,alpha:Math.max(0,Math.min(1,(rt-a.t)/(b.t-a.t+.001)))};
      }
    }
    return {a:this.states[this.states.length-1],b:null,alpha:0};
  }
}

// ═══════════════════════════════════════════════════════════
//  REMOTE PLAYERS
// ═══════════════════════════════════════════════════════════
const remotePlayers={};
const _qa=new THREE.Quaternion(), _qb=new THREE.Quaternion();

function getOrCreateRemote(id,name,state){
  if(remotePlayers[id]) return remotePlayers[id];
  const color=playerColor(id);
  const rp={
    id,name,color,state,
    astro:makeRemoteAstronaut(color),
    ship:makeRemoteShip(color),
    pos:new THREE.Vector3(),
    q:new THREE.Quaternion(),
    hp:ASTRO_MAX_HP, shipHp:SHIP_MAX_HP,
    lastSeen:Date.now(),
    planetName:undefined,
    snap:new SnapBuffer(150),
  };
  rp.astro.add(makeNameLabel(name,color));
  rp.ship.add(makeNameLabel(name,color));
  scene.add(rp.astro); scene.add(rp.ship);
  remotePlayers[id]=rp;
  return rp;
}

function removeRemote(id){
  const rp=remotePlayers[id]; if(!rp)return;
  [rp.astro,rp.ship].forEach(m=>{if(m.parent)m.parent.remove(m);});
  delete remotePlayers[id];
}

function reparentRemote(rp,planetName){
  if(rp.planetName===planetName) return;
  [rp.astro,rp.ship].forEach(m=>{if(m.parent)m.parent.remove(m);});
  if(planetName){
    const pd=PLANET_DEFS.find(p=>p.name===planetName);
    if(pd){pd.pivot.add(rp.astro);pd.pivot.add(rp.ship);}
  } else {
    scene.add(rp.astro); scene.add(rp.ship);
  }
  rp.planetName=planetName;
}

function updateRemotePlayers(dt){
  const now=Date.now();
  const lines=[];
  Object.values(remotePlayers).forEach(rp=>{
    if(now-rp.lastSeen>8000){removeRemote(rp.id);return;}
    const snap=rp.snap.get();
    if(!snap) return;

    // Resolve interpolated state
    let px,py,pz,qx,qy,qz,qw;
    if(snap.b){
      const {a,b,alpha}=snap;
      px=a.px+(b.px-a.px)*alpha; py=a.py+(b.py-a.py)*alpha; pz=a.pz+(b.pz-a.pz)*alpha;
      _qa.set(a.qx,a.qy,a.qz,a.qw); _qb.set(b.qx,b.qy,b.qz,b.qw);
      _qa.slerp(_qb,alpha);
      qx=_qa.x; qy=_qa.y; qz=_qa.z; qw=_qa.w;
    } else {
      const {a}=snap; const age=(now-a.t)*.001;
      // Dead reckoning: extrapolate using stored velocity
      px=a.px+(a.vx||0)*age; py=a.py+(a.vy||0)*age; pz=a.pz+(a.vz||0)*age;
      qx=a.qx; qy=a.qy; qz=a.qz; qw=a.qw;
    }

    rp.pos.set(px,py,pz); rp.q.set(qx,qy,qz,qw);
    const inFly=rp.state==='fly', inFloat=rp.state==='float';
    rp.astro.visible=!inFly; rp.ship.visible=inFly;
    const mesh=inFly?rp.ship:rp.astro;
    mesh.position.copy(rp.pos); mesh.quaternion.copy(rp.q);

    lines.push(`● ${rp.name}`);
  });
  document.getElementById('players-hud').textContent=lines.join('\n');
}

function handleRemotePlayer(payload){
  if(payload.id===myId) return;
  const rp=getOrCreateRemote(payload.id,payload.name,payload.state);

  rp.state=payload.state;
  if(payload.hp!==undefined) rp.hp=payload.hp;
  if(payload.shipHp!==undefined) rp.shipHp=payload.shipHp;

  // Push to snapshot buffer
  rp.snap.add({
    px:payload.px, py:payload.py, pz:payload.pz,
    qx:payload.qx, qy:payload.qy, qz:payload.qz, qw:payload.qw,
    vx:payload.vx||0, vy:payload.vy||0, vz:payload.vz||0,
    state:payload.state, planet:payload.planet
  });

  // Re-parent on planet change (snap position to avoid lerp from wrong space)
  const prevPlanet=rp.planetName;
  reparentRemote(rp,payload.planet||null);
  if(rp.planetName!==prevPlanet){
    rp.pos.set(payload.px,payload.py,payload.pz);
    rp.q.set(payload.qx,payload.qy,payload.qz,payload.qw);
  }
  rp.lastSeen=Date.now();
}

function handleShot(payload){
  if(payload.from===myId) return;
  const origin=new THREE.Vector3(payload.ox,payload.oy,payload.oz);
  const vel=new THREE.Vector3(payload.vx,payload.vy,payload.vz);
  const mesh=makeProjectileMesh(payload.color||0x44aaff);
  mesh.position.copy(origin); scene.add(mesh);
  visualProjs.push({mesh,pos:origin.clone(),vel,life:SHOT_LIFE});
}

function handleHit(payload){
  if(payload.to!==myId) return;
  takeDamage(payload.dmg,payload.type,payload.from);
}

function handleDie(payload){
  if(payload.id===myId) return;
  const rp=remotePlayers[payload.id]; if(!rp)return;
  if(payload.kind==='ship'){
    rp.shipHp=0;
    spawnExplosion(rp.pos.clone(),2.0,0xff6600);
  } else {
    rp.hp=0;
    spawnExplosion(rp.pos.clone(),.5,0xff4422);
  }
  if(payload.by===myId){
    kills++;
    addKillFeed(`you ${payload.kind==='ship'?'destroyed':'eliminated'} ${rp.name}`);
    updateHud();
  } else if(rp){
    addKillFeed(`${remotePlayers[payload.by]?.name||'?'} got ${rp.name}`);
  }
}

let broadcastTimer=0;
const BROADCAST_RATE=.05; // 20 Hz

function broadcastState(){
  if(!channel||!myId) return;
  let px,py,pz,qx,qy,qz,qw,vx,vy,vz,planet=null;
  if(gameState==='fly'){
    px=shipPos.x; py=shipPos.y; pz=shipPos.z;
    qx=shipQ.x; qy=shipQ.y; qz=shipQ.z; qw=shipQ.w;
    vx=shipVel.x; vy=shipVel.y; vz=shipVel.z;
  } else if(gameState==='float'){
    px=floatPos.x; py=floatPos.y; pz=floatPos.z;
    charPivot.quaternion.set(0,0,0,1);
    qx=charPivot.quaternion.x; qy=charPivot.quaternion.y;
    qz=charPivot.quaternion.z; qw=charPivot.quaternion.w;
    vx=floatVel.x; vy=floatVel.y; vz=floatVel.z;
  } else {
    px=charPivot.position.x; py=charPivot.position.y; pz=charPivot.position.z;
    qx=charPivot.quaternion.x; qy=charPivot.quaternion.y;
    qz=charPivot.quaternion.z; qw=charPivot.quaternion.w;
    vx=0; vy=0; vz=0;
    planet=activePD.name;
  }
  channel.send({
    type:'broadcast',event:'player',
    payload:{id:myId,name:myName,state:gameState,
      px,py,pz,qx,qy,qz,qw,vx,vy,vz,planet,
      hp:myHp,shipHp:myShipHp}
  });
}

function broadcastShot(origin,vel,color,type){
  if(!channel||!myId) return;
  channel.send({type:'broadcast',event:'shot',
    payload:{from:myId,ox:origin.x,oy:origin.y,oz:origin.z,
      vx:vel.x,vy:vel.y,vz:vel.z,color,type}});
}
function broadcastHit(toId,dmg,type){
  if(!channel||!myId) return;
  channel.send({type:'broadcast',event:'hit',
    payload:{from:myId,to:toId,dmg,type}});
}
function broadcastDie(kind){
  if(!channel||!myId) return;
  channel.send({type:'broadcast',event:'die',
    payload:{id:myId,by:myId,kind}});
}

//  LOGIN + SUPABASE CONNECT
// ═══════════════════════════════════════════════════════════
document.getElementById('join-btn').addEventListener('click',joinWorld);
document.getElementById('name-input').addEventListener('keydown',e=>{if(e.key==='Enter')joinWorld();});

async function joinWorld(){
  const nameRaw=document.getElementById('name-input').value.trim();
  const errEl=document.getElementById('login-err');
  if(!nameRaw){errEl.textContent='enter a callsign';return;}
  if(nameRaw.length<2){errEl.textContent='too short';return;}
  errEl.textContent='connecting…';
  myName=nameRaw;
  myId=`${nameRaw}_${Math.random().toString(36).slice(2,7)}`;
  try{
    channel=sb.channel('game-world',{config:{broadcast:{self:false}}});
    channel
      .on('broadcast',{event:'player'},({payload})=>handleRemotePlayer(payload))
      .on('broadcast',{event:'shot'},  ({payload})=>handleShot(payload))
      .on('broadcast',{event:'hit'},   ({payload})=>handleHit(payload))
      .on('broadcast',{event:'die'},   ({payload})=>handleDie(payload))
      .on('presence', {event:'leave'}, ({leftPresences})=>{
        leftPresences.forEach(p=>{if(p.id)removeRemote(p.id);});
      })
      .subscribe(async status=>{
        if(status==='SUBSCRIBED') await channel.track({id:myId,name:myName});
      });
    document.getElementById('login-screen').style.display='none';
    gameReady=true;
    window.addEventListener('beforeunload',()=>{if(channel)channel.untrack();});
  }catch(e){
    errEl.textContent='connection failed';
    console.error(e);
  }
}

// ═══════════════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════════════
const clock=new THREE.Clock();
let orbitTimer=0;

function loop(){
  requestAnimationFrame(loop);
  const dt=Math.min(clock.getDelta(),.05);
  const t=clock.elapsedTime;
  sunMat.uniforms.time.value=t;
  if(!gameReady){renderer.render(scene,camera);return;}

  const moveFwd=(gameState==='walk'||gameState==='float')
    ?(K['KeyW']||K['ArrowUp']?1:K['KeyS']||K['ArrowDown']?-1:-JOY.ly):0;
  const moveRight=(gameState==='walk'||gameState==='float')
    ?(K['KeyD']?1:K['KeyA']?-1:JOY.lx):0;
  const thrustFB=gameState==='fly'?(K['KeyW']?1:K['KeyS']?-1:-JOY.ly):0;
  const strafeRL=gameState==='fly'?(K['KeyD']?1:K['KeyA']?-1:JOY.lx):0;
  const roll    =gameState==='fly'?(K['KeyQ']?1:K['KeyE']?-1:-JOY.rx):0;

  keplerStep(dt);
  updateTails();
  updateRemotePlayers(dt);

  broadcastTimer-=dt;
  if(broadcastTimer<=0){broadcastTimer=BROADCAST_RATE;broadcastState();}

  shootCooldown-=dt;
  // Hold-to-shoot (hold left mouse not via event but via K)
  // Auto-fire while holding shoot key
  if(K['KeyF1']&&shootCooldown<=0&&gameReady){fireShot();shootCooldown=SHOOT_COOLDOWN;}

  PLANET_DEFS[0].mesh.rotation.y+=.00008;
  PLANET_DEFS[1].mesh.rotation.y+=.00005;
  PLANET_DEFS[2].mesh.rotation.y+=.00012;
  PLANET_DEFS[3].mesh.rotation.y+=.00003;
  PLANET_DEFS[4].mesh.rotation.y+=.00015;

  if(fxTimer>0){fxTimer-=dt;if(fxTimer<=0)fxEl.style.opacity='0';}

  updateExplosions(dt);
  updateLocalProjs(dt);
  updateVisualProjs(dt);

  if(gameState==='walk'){
    walkStep(dt,moveFwd,moveRight);
    walkCamera();
    const cw=new THREE.Vector3(),sw=new THREE.Vector3();
    charPivot.getWorldPosition(cw); shipPivot.getWorldPosition(sw);
    if(cw.distanceTo(sw)<1.9)
      document.getElementById('hint').textContent='[ E ] board ship';
    else
      document.getElementById('hint').textContent=
        'click to aim · WASD·move · SHIFT·run · E·board · click·shoot · ESC·unlock';
  } else if(gameState==='fly'){
    shipFlyStep(dt,thrustFB,strafeRL,roll);
    flyCamera();
    if(thrustFB!==0||strafeRL!==0) refreshOrbits();
    else{orbitTimer-=dt;if(orbitTimer<=0){orbitTimer=3;refreshOrbits();}}
    const canLand=PLANET_DEFS.some(pd=>shipPos.distanceTo(pd.physPos)<pd.R+3.5);
    document.getElementById('hint').textContent=canLand
      ?'[ F / ↓ ] land'
      :'WASD·move  Q/E·roll  MOUSE·aim  CLICK·shoot  F/↓·land';
  } else { // float
    floatStep(dt);
    floatCamera();
  }

  renderer.render(scene,camera);
}
loop();
setTimeout(refreshOrbits,300);

// ── Planet size table ──────────────────────────────────────
function updateTableStarMarkers(){
  const sunEl=document.getElementById('ptstar-sun');
  if(sunEl) sunEl.textContent=(starIdx<0)?'★':'';
  PLANET_DEFS.forEach((pd,i)=>{
    const el=document.getElementById('ptstar-'+i);
    if(el) el.textContent=(i===starIdx)?'★':'';
  });
}

function makeTableRow(starId,label,initSize){
  const row=document.createElement('div'); row.className='pt-row';
  const star=document.createElement('span'); star.className='pt-star'; star.id='ptstar-'+starId;
  const name=document.createElement('span'); name.className='pt-name'; name.textContent=label;
  const inp=document.createElement('input');
  inp.type='number'; inp.className='pt-inp'; inp.id='ptval-'+starId;
  inp.min='0.1'; inp.step='0.5'; inp.value=initSize.toFixed(1);
  inp.addEventListener('input',()=>{
    const v=parseFloat(inp.value); if(isNaN(v)||v<0.1) return;
    applySize(starId,v);
  });
  inp.addEventListener('mousedown',e=>e.stopPropagation());
  inp.addEventListener('click',e=>e.stopPropagation());
  row.appendChild(star); row.appendChild(name); row.appendChild(inp);
  return row;
}

function applySize(starId,v){
  if(starId==='sun'){
    sunSize=Math.max(0.1,v);
  } else {
    const i=parseInt(starId); const pd=PLANET_DEFS[i];
    pd.size=Math.max(0.1,v);
    pd.gm=pd.size*.35;
    pd.pivot.scale.setScalar(pd.size/pd.baseR);
  }
  checkStarTransition();
  updateStarVisuals();
  refreshOrbits();
}

function buildPlanetTable(){
  const rows=document.getElementById('pt-rows');
  rows.innerHTML='';
  rows.appendChild(makeTableRow('sun','Star',sunSize));
  PLANET_DEFS.forEach((pd,i)=>rows.appendChild(makeTableRow(String(i),pd.label,pd.size)));
}

buildPlanetTable();
updateStarVisuals();

addEventListener('resize',()=>{
  renderer.setSize(innerWidth,innerHeight);
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
});
